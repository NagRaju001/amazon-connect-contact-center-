name: Deploy to AWS
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Install and zip api-services
        run: |
          cd services/lambdas/api-services
          npm install
          zip -r function.zip src/ node_modules/ package.json
      - name: Install and zip lex-hook
        run: |
          cd services/lambdas/lex-hook
          npm install
          zip -r function.zip src/ node_modules/ package.json
      - name: Install and zip connect-greeting
        run: |
          cd services/lambdas/connect-greeting
          npm install
          zip -r function.zip src/ node_modules/ package.json
      - name: Deploy api-services Lambda
        run: |
          aws lambda update-function-code \
            --function-name api-orders-service \
            --zip-file fileb://services/lambdas/api-services/function.zip
      - name: Wait for api-services to be ready
        run: |
          aws lambda wait function-updated \
            --function-name api-orders-service
      - name: Deploy lex-hook Lambda
        run: |
          aws lambda update-function-code \
            --function-name lex-hook \
            --zip-file fileb://services/lambdas/lex-hook/function.zip
      - name: Wait for lex-hook to be ready
        run: |
          aws lambda wait function-updated \
            --function-name lex-hook
      - name: Set lex-hook environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name lex-hook \
            --environment "Variables={API_BASE_URL=${{ secrets.API_BASE_URL }},ORDER_PREFIX=ORD1}"
      - name: Deploy connect-greeting Lambda
        run: |
          aws lambda update-function-code \
            --function-name connect-greeting \
            --zip-file fileb://services/lambdas/connect-greeting/function.zip
      - name: Wait for connect-greeting to be ready
        run: |
          aws lambda wait function-updated \
            --function-name connect-greeting
      - name: Set connect-greeting environment variables
        run: |
          aws lambda update-function-configuration \
            --function-name connect-greeting \
            --environment "Variables={CUSTOMERS_TABLE=Customers}"